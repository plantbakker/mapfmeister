const map=L.map('map',{center:[53,20],zoom:6,minZoom:2,maxZoom:14});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19
}).addTo(map);

const layers={};
Object.keys(REGIONS).forEach(r=>{layers[r]=L.layerGroup().addTo(map);});

DATA.forEach(([de,local,lang,lat,lng,r,sz])=>{
  const icon=L.divIcon({
    className:`exonym-label sz-${sz} r-${r}`,
    html:`<div class="inner">${de}</div>`,
    iconAnchor:[0,6]
  });
  const m=L.marker([lat,lng],{icon});
  m.bindPopup(`<div class="popup-body">
    <div class="rtag">${REGIONS[r]?.label||r}</div>
    <div class="de">${de}</div>
    <div class="arr">↓ heutiger Name</div>
    <div class="local">${local}</div>
    <div class="lang">${lang}</div>
  </div>`,{maxWidth:280});
  layers[r].addLayer(m);
});

function updateBadge(r){
  const n=r==='all'?DATA.length:DATA.filter(d=>d[5]===r).length;
  document.getElementById('badge').textContent=`${n} Orte`;
}
updateBadge('all');

document.querySelectorAll('.pill').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const r=btn.dataset.r;
    Object.entries(layers).forEach(([k,lg])=>{
      if(r==='all'||k===r){if(!map.hasLayer(lg))map.addLayer(lg);}
      else{if(map.hasLayer(lg))map.removeLayer(lg);}
    });
    updateBadge(r);
    if(r!=='all'&&REGIONS[r]?.bounds){map.fitBounds(REGIONS[r].bounds,{padding:[28,28]});}
    else if(r==='all'){map.setView([53,20],6);}
    else{map.setView([30,15],3);}
  });
});
