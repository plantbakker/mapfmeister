<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deutsche Exonyme – Weltkarte</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=IM+Fell+DW+Pica:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --ink:    #1c1410;
      --parch:  #f5edd6;
      --gold:   #b8892a;
      --red:    #8b2020;
      --border: #a0865a;
      --blue:   #1a3a5c;
      --green:  #2a5c3a;
      --purple: #4a2060;
      --teal:   #1a5c50;
      --orange: #7a3a10;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--parch);
      color: var(--ink);
      font-family: 'IM Fell DW Pica', Georgia, serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      position: relative;
      z-index: 1000;
      background: var(--ink);
      border-bottom: 3px solid var(--gold);
      padding: 8px 22px;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 2.2vw, 1.5rem);
      color: var(--parch);
      letter-spacing: .04em;
      white-space: nowrap;
    }
    header h1 span { color: var(--gold); }
    header p {
      font-size: .78rem;
      color: #c8b98a;
      font-style: italic;
    }

    /* Filter bar */
    #filters {
      margin-left: auto;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      font-family: 'IM Fell DW Pica', serif;
      font-size: .72rem;
      padding: 3px 9px;
      border: 1px solid;
      border-radius: 2px;
      cursor: pointer;
      background: transparent;
      color: var(--parch);
      transition: all .15s;
      white-space: nowrap;
    }
    .filter-btn:hover, .filter-btn.active { color: var(--ink); }
    .filter-btn[data-region="all"]           { border-color: var(--gold);   }
    .filter-btn[data-region="all"].active    { background: var(--gold); }
    .filter-btn[data-region="ostpreussen"]   { border-color: #6ab0e0; }
    .filter-btn[data-region="ostpreussen"].active { background: #6ab0e0; }
    .filter-btn[data-region="schlesien"]     { border-color: #80c080; }
    .filter-btn[data-region="schlesien"].active   { background: #80c080; }
    .filter-btn[data-region="pommern"]       { border-color: #c080c0; }
    .filter-btn[data-region="pommern"].active     { background: #c080c0; }
    .filter-btn[data-region="posen"]         { border-color: #e0a040; }
    .filter-btn[data-region="posen"].active       { background: #e0a040; }
    .filter-btn[data-region="sudetenland"]   { border-color: #e06060; }
    .filter-btn[data-region="sudetenland"].active { background: #e06060; }
    .filter-btn[data-region="elsass"]        { border-color: #60c0c0; }
    .filter-btn[data-region="elsass"].active      { background: #60c0c0; }
    .filter-btn[data-region="suedtirol"]     { border-color: #c0a060; }
    .filter-btn[data-region="suedtirol"].active   { background: #c0a060; }
    .filter-btn[data-region="baltikum"]      { border-color: #a0a0e0; }
    .filter-btn[data-region="baltikum"].active    { background: #a0a0e0; }
    .filter-btn[data-region="siebenb"]       { border-color: #e08060; }
    .filter-btn[data-region="siebenb"].active     { background: #e08060; }
    .filter-btn[data-region="world"]         { border-color: #90c090; }
    .filter-btn[data-region="world"].active       { background: #90c090; }

    #map { flex: 1; background: #c8dde8; }
    .leaflet-tile { filter: sepia(.45) brightness(.97) contrast(.9); }

    /* Labels */
    .exonym-label {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }
    .exonym-label .inner {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      text-shadow:
         1px  1px 0 var(--parch),
        -1px -1px 0 var(--parch),
         1px -1px 0 var(--parch),
        -1px  1px 0 var(--parch);
      white-space: nowrap;
      cursor: pointer;
      letter-spacing: .03em;
    }
    .exonym-label .inner:hover { opacity: .7; }

    /* Size classes */
    .sz-lg  .inner { font-size: 13px; }
    .sz-md  .inner { font-size: 11px; }
    .sz-sm  .inner { font-size: 9px; }

    /* Region colours */
    .r-ostpreussen .inner { color: #1a6090; }
    .r-schlesien   .inner { color: #1a6030; }
    .r-pommern     .inner { color: #702090; }
    .r-posen       .inner { color: #904010; }
    .r-sudetenland .inner { color: #901010; }
    .r-elsass      .inner { color: #106060; }
    .r-suedtirol   .inner { color: #705010; }
    .r-baltikum    .inner { color: #202090; }
    .r-siebenb     .inner { color: #904020; }
    .r-world       .inner { color: #8b2020; }

    /* Popup */
    .leaflet-popup-content-wrapper {
      background: var(--parch) !important;
      border: 2px solid var(--border) !important;
      border-radius: 2px !important;
      box-shadow: 4px 4px 14px rgba(0,0,0,.35) !important;
      padding: 0 !important;
    }
    .leaflet-popup-tip { background: var(--border) !important; }
    .leaflet-popup-content { margin: 0 !important; }
    .popup-body { padding: 12px 16px 10px; min-width: 170px; }
    .popup-body .de {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 700;
      letter-spacing: .03em;
    }
    .popup-body .region-tag {
      font-size: .65rem; color: #999;
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 4px;
    }
    .popup-body .arrow { font-size: .72rem; color: var(--border); font-style: italic; margin: 3px 0; }
    .popup-body .local { font-size: .98rem; color: var(--ink); font-style: italic; }
    .popup-body .lang  { font-size: .68rem; color: #888; margin-top: 2px; }

    /* Legend */
    #legend {
      position: absolute;
      bottom: 28px; left: 14px;
      z-index: 900;
      background: rgba(28,20,16,.88);
      color: var(--parch);
      font-size: .68rem;
      padding: 8px 12px;
      border: 1px solid var(--gold);
      border-radius: 2px;
      line-height: 1.8;
      pointer-events: none;
    }
    #legend strong { color: var(--gold); font-family: 'Playfair Display', serif; display: block; margin-bottom: 2px; }
    .leg-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

    #count-badge {
      position: absolute;
      top: 70px; right: 14px;
      z-index: 900;
      background: rgba(28,20,16,.82);
      color: var(--gold);
      font-family: 'Playfair Display', serif;
      font-size: .75rem;
      padding: 4px 10px;
      border: 1px solid var(--gold);
      border-radius: 2px;
      pointer-events: none;
    }
  </style>
</head>

// ── Map init ───────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [51, 18],
  zoom: 5,
  minZoom: 2,
  maxZoom: 12,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

const regionLabels = {
  ostpreussen: "Ostpreußen",
  schlesien:   "Schlesien",
  pommern:     "Pommern",
  posen:       "Posen",
  sudetenland: "Sudetenland",
  elsass:      "Elsass / Lothringen",
  suedtirol:   "Südtirol / Trentino",
  baltikum:    "Baltikum",
  siebenb:     "Siebenbürgen",
  world:       "Welt",
};

// ── Build markers ──────────────────────────────────────────────────────────
const layerGroups = {};
Object.keys(regionLabels).forEach(r => { layerGroups[r] = L.layerGroup(); });

const allMarkers = [];

places.forEach(([de, local, lang, lat, lng, region, size]) => {
  const icon = L.divIcon({
    className: `exonym-label sz-${size} r-${region}`,
    html: `<div class="inner">${de}</div>`,
    iconAnchor: [0, 6],
  });
  const m = L.marker([lat, lng], { icon });
  m.bindPopup(`
    <div class="popup-body">
      <div class="region-tag">${regionLabels[region] || region}</div>
      <div class="de">${de}</div>
      <div class="arrow">↓ heutiger Name</div>
      <div class="local">${local}</div>
      <div class="lang">${lang}</div>
    </div>
  `, { maxWidth: 280 });
  layerGroups[region].addLayer(m);
  allMarkers.push({ marker: m, region });
});

// Add all to map by default
Object.values(layerGroups).forEach(lg => lg.addTo(map));

// ── Count badge ────────────────────────────────────────────────────────────
function updateCount(active) {
  const n = active === 'all'
    ? places.length
    : places.filter(p => p[5] === active).length;
  document.getElementById('count-badge').textContent = `${n} Orte`;
}
updateCount('all');

// ── Filter buttons ─────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const region = btn.dataset.region;
    Object.entries(layerGroups).forEach(([r, lg]) => {
      if (region === 'all' || r === region) {
        if (!map.hasLayer(lg)) map.addLayer(lg);
      } else {
        if (map.hasLayer(lg)) map.removeLayer(lg);
      }
    });
    updateCount(region);
    // Zoom to region
    const zoomTargets = {
      ostpreussen: [[53.0,18.0],[55.5,22.5]],
      schlesien:   [[49.8,14.5],[52.0,18.5]],
      pommern:     [[53.3,13.0],[55.0,18.5]],
      posen:       [[51.5,15.0],[53.5,18.5]],
      sudetenland: [[48.5,12.0],[51.0,18.0]],
      elsass:      [[47.5, 6.0],[49.5, 8.0]],
      suedtirol:   [[45.5,10.5],[47.0,14.0]],
      baltikum:    [[54.5,21.0],[59.7,28.5]],
      siebenb:     [[44.5,20.5],[48.0,26.5]],
    };
    if (zoomTargets[region]) {
      map.fitBounds(zoomTargets[region], { padding: [30, 30] });
    } else if (region === 'all') {
      map.setView([51, 18], 5);
    } else {
      map.setView([30, 15], 3);
    }
  });
});
</script>
