    .pill:hover,.pill.active { color:var(--ink); }

    #map { flex:1; background:#c8dde8; }
    .leaflet-tile { filter:sepia(.45) brightness(.97) contrast(.9); }
    .exonym-label { background:transparent!important; border:none!important; box-shadow:none!important; }
    .exonym-label .inner { font-family:'Playfair Display',serif; font-weight:700; white-space:nowrap; cursor:pointer; letter-spacing:.03em; text-shadow:1px 1px 0 var(--parch),-1px -1px 0 var(--parch),1px -1px 0 var(--parch),-1px 1px 0 var(--parch); }
    .exonym-label .inner:hover { opacity:.6; }
    .sz-lg .inner { font-size:13px; } .sz-md .inner { font-size:10px; } .sz-sm .inner { font-size:8px; }
    .r-op  .inner { color:#0b5080; } .r-kob .inner { color:#0d5aaa; }
    .r-sl  .inner { color:#165a28; } .r-po  .inner { color:#602080; }

    .r-ba  .inner { color:#182078; } .r-si  .inner { color:#883018; }
    .r-wo  .inner { color:#8b2020; }
    .leaflet-popup-content-wrapper { background:var(--parch)!important; border:2px solid var(--border)!important; border-radius:2px!important; box-shadow:4px 4px 14px rgba(0,0,0,.35)!important; padding:0!important; }
    .leaflet-popup-tip { background:var(--border)!important; }
    .leaflet-popup-content { margin:0!important; }
    .popup-body { padding:10px 14px 8px; min-width:155px; }
    .popup-body .rtag { font-size:.6rem; color:#999; text-transform:uppercase; letter-spacing:.06em; margin-bottom:3px; }
    .popup-body .de { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; }
    .popup-body .arr { font-size:.68rem; color:var(--border); font-style:italic; margin:3px 0; }
    .popup-body .local { font-size:.9rem; font-style:italic; }
    .popup-body .lang { font-size:.63rem; color:#888; margin-top:2px; }
    #legend { position:absolute; bottom:24px; left:12px; z-index:900; background:rgba(28,20,16,.88); color:var(--parch); font-size:.61rem; padding:7px 11px; border:1px solid var(--gold); border-radius:2px; line-height:1.85; pointer-events:none; }

["Mittelmeer","Mediterranean Sea","Englisch",35.00,18.00,"wo","sm"],
["Schwarzes Meer","Black Sea","Englisch",43.00,34.00,"wo","sm"],
];

const REGIONS={
  op:  {label:"Ostpreußen (Polen)",        bounds:[[52.3,17.0],[55.2,23.6]]},
  kob: {label:"Kaliningrader Oblast",      bounds:[[54.2,19.5],[55.3,22.9]]},
  sl:  {label:"Schlesien",                 bounds:[[49.8,14.4],[52.6,18.6]]},
  po:  {label:"Pommern",                   bounds:[[53.0,12.8],[55.1,18.7]]},
  ps:  {label:"Posen",                     bounds:[[51.0,14.8],[53.5,18.6]]},
  su:  {label:"Sudetenland",               bounds:[[48.4,11.9],[51.2,18.1]]},
  el:  {label:"Elsass / Lothringen",       bounds:[[47.3,5.9],[49.7,8.2]]},
  st:  {label:"Südtirol / Trentino",       bounds:[[45.4,10.4],[47.1,14.1]]},
  ba:  {label:"Baltikum",                  bounds:[[54.1,20.8],[60.1,28.9]]},
  si:  {label:"Siebenbürgen / Vojvodina",  bounds:[[44.4,19.4],[48.1,26.6]]},
  wo:  {label:"Welt",                      bounds:null},
};

const map=L.map('map',{center:[53,20],zoom:6,minZoom:2,maxZoom:14});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19
}).addTo(map);

const layers={};
Object.keys(REGIONS).forEach(r=>{layers[r]=L.layerGroup().addTo(map);});

DATA.forEach(([de,local,lang,lat,lng,r,sz])=>{
  const icon=L.divIcon({
    className:`exonym-label sz-${sz} r-${r}`,
    html:`<div class="inner">${de}</div>`,
    iconAnchor:[0,6]
  });
  const m=L.marker([lat,lng],{icon});
  m.bindPopup(`<div class="popup-body">
    <div class="rtag">${REGIONS[r]?.label||r}</div>
    <div class="de">${de}</div>
    <div class="arr">↓ heutiger Name</div>
    <div class="local">${local}</div>
    <div class="lang">${lang}</div>
  </div>`,{maxWidth:280});
  layers[r].addLayer(m);
});

function updateBadge(r){
  const n=r==='all'?DATA.length:DATA.filter(d=>d[5]===r).length;
  document.getElementById('badge').textContent=`${n} Orte`;
}
updateBadge('all');

document.querySelectorAll('.pill').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const r=btn.dataset.r;
    Object.entries(layers).forEach(([k,lg])=>{
      if(r==='all'||k===r){if(!map.hasLayer(lg))map.addLayer(lg);}
      else{if(map.hasLayer(lg))map.removeLayer(lg);}
    });
    updateBadge(r);
    if(r!=='all'&&REGIONS[r]?.bounds){map.fitBounds(REGIONS[r].bounds,{padding:[28,28]});}
    else if(r==='all'){map.setView([53,20],6);}
    else{map.setView([30,15],3);}
  });
});
</script>
</body>
</html>
