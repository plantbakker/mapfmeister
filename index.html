  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --ink:     #1c1410;
      --parch:   #f5edd6;
      --parch2:  #ede0c0;
      --gold:    #b8892a;
      --red:     #8b2020;
      --border:  #a0865a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--parch);
      color: var(--ink);
      font-family: 'IM Fell DW Pica', Georgia, serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      position: relative;
      z-index: 1000;
      background: var(--ink);
      border-bottom: 3px solid var(--gold);
      padding: 10px 22px;
      display: flex;
      align-items: baseline;
      gap: 18px;
    }
    header h1 {
      font-family: 'Playfair Display', 'Times New Roman', serif;
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      color: var(--parch);
      letter-spacing: .04em;
    }
    header h1 span { color: var(--gold); }
    header p {
      font-size: .8rem;
      color: #c8b98a;
      font-style: italic;
    }

    /* ── Map ─────────────────────────────────────────── */
    #map {
      flex: 1;
      background: #c8dde8;
    }

    /* Leaflet tile parchment filter */
    .leaflet-tile { filter: sepia(.45) brightness(.97) contrast(.9); }

    /* ── Custom marker labels ────────────────────────── */
    .exonym-label {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }
    .exonym-label .inner {
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--red);
      text-shadow:
         1px  1px 0 var(--parch),
        -1px -1px 0 var(--parch),
         1px -1px 0 var(--parch),
        -1px  1px 0 var(--parch);
      white-space: nowrap;
      cursor: pointer;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .exonym-label .inner:hover { color: var(--gold); }

    /* ── Popup ───────────────────────────────────────── */
    .leaflet-popup-content-wrapper {
      background: var(--parch) !important;
      border: 2px solid var(--border) !important;
      border-radius: 2px !important;
      box-shadow: 4px 4px 14px rgba(0,0,0,.35) !important;
      padding: 0 !important;
    }
    .leaflet-popup-tip { background: var(--border) !important; }
    .leaflet-popup-content { margin: 0 !important; }
    .popup-body {
      padding: 14px 18px 12px;
      min-width: 180px;
    }
    .popup-body .de {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--red);
      letter-spacing: .03em;
    }
    .popup-body .arrow {
      font-size: .75rem;
      color: var(--border);
      margin: 3px 0;
      font-style: italic;
    }
    .popup-body .local {
      font-size: 1rem;
      color: var(--ink);
      font-style: italic;
    }
    .popup-body .lang {
      font-size: .7rem;
      color: #888;
      margin-top: 2px;
    }

    /* ── Legend ──────────────────────────────────────── */
    #legend {
      position: absolute;
      bottom: 28px;
      left: 16px;
      z-index: 900;
      background: rgba(28,20,16,.82);
      color: var(--parch);
      font-size: .72rem;
      padding: 8px 12px;
      border: 1px solid var(--gold);
      border-radius: 2px;
      line-height: 1.6;
      pointer-events: none;
    }
    #legend strong { color: var(--gold); font-family: 'Playfair Display', serif; }
  </style>
</head>
